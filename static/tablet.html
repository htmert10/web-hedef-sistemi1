<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Hedef Kamerası</title><link rel="stylesheet" href="/static/css/style.css?v=3"></head>
<body><main class="app-shell"><header><div><p class="eyebrow">SENSÖR</p><h1>Hedef kamerası</h1></div><a href="/">Ana ekran</a></header>
<section class="sensor-grid"><div class="panel"><div class="camera-stage"><video id="video" playsinline muted></video><canvas id="camera"></canvas><canvas id="overlay"></canvas></div><div id="status" class="status">Kamerayı başlat.</div><div class="steps"><button id="start" class="primary">1 · Kamerayı aç</button><button id="corners" disabled>2 · Dört köşeyi seç</button><button id="reference" disabled>3 · Temiz hedefi kaydet</button><button id="arm" disabled>4 · Algılamayı başlat</button><button id="test" disabled>Şimdi kontrol et</button></div></div>
<aside class="panel"><div class="panel-title"><h2>Düzeltilmiş hedef</h2><span id="connection" class="pill">Bağlanıyor</span></div><canvas id="warped" width="400" height="400"></canvas><div class="settings"><label>Minimum delik boyutu <strong id="sizeLabel">3.5 mm</strong><input id="minSize" type="range" min="2" max="7" value="3.5" step="0.5"></label><label>Algılama hassasiyeti <strong id="sensitivityLabel">Normal</strong><input id="sensitivity" type="range" min="0" max="2" value="1"></label></div><div id="review" class="review hidden"><p>Değişim bulundu. Mavi işaret doğru yerde mi?</p><div><button id="accept" class="primary">Kabul et</button><button id="reject">Reddet</button></div></div><p class="hint">Telefon sabit olmalı. Köşeleri kâğıdın dış sınırından saat yönünde seç. Temiz referansı hedefte yeni delik yokken kaydet.</p></aside></section></main>
<script src="/static/js/tablet.js?v=clean-10"></script></body></html>
